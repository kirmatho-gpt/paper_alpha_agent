rank_paper_relevance: |
  Score the paper for quant research relevance, implementability, and novelty.
  Focus on forecasting of financial instruments, relative value signals, time horizon clarity, and practical testability.

summarize_paper: |
  Produce a structured research summary for this paper using only evidence that is reasonably supported by the provided text.
  Classify the paper as one of: directly_relevant, adjacent, or out_of_scope.
  Focus on whether it is useful for ML/deep learning forecasting of financial products or relative value research.
  If the abstract does not justify a field, use null or describe the uncertainty in missing_information instead of guessing.

assess_prior_art: |
  Compare the paper against adjacent prior work and identify overlaps, differentiation, and replication risk.

extract_research_idea: |
  Turn the paper into one implementable research idea with a clear signal, dataset assumptions, and caveats.

build_prototype_spec: |
  Convert the idea into a simplified prototype spec with data requirements, features, signal logic, and evaluation plan.

critique_backtest: |
  Critique a toy backtest result, focusing on overfitting risk, missing frictions, and next validation steps.
